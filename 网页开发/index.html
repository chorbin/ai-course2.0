<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI大模型技术与商业应用 - 在线学习课程</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1>AI大模型技术与商业应用</h1>
            </div>
            <div class="header-info">
                <span class="chapter-count">41章节</span>
                <span class="divider">|</span>
                <span class="module-count">八大模块</span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>📚 课程目录</h2>
                <button class="toggle-all" id="toggleAll">全部展开</button>
            </div>
            <nav class="chapter-nav" id="chapterNav">
                <!-- Chapters will be dynamically loaded -->
                <div class="loading">加载中...</div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="content" id="mainContent">
            <div class="welcome-message">
                <h2>👋 欢迎来到AI学习之旅</h2>
                <p>请从左侧目录选择章节开始学习</p>
                <div class="quick-stats">
                    <div class="stat-card">
                        <div class="stat-icon">📖</div>
                        <div class="stat-number">41</div>
                        <div class="stat-label">章节课程</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎯</div>
                        <div class="stat-number">8</div>
                        <div class="stat-label">核心模块</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💡</div>
                        <div class="stat-number">100+</div>
                        <div class="stat-label">实战案例</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
